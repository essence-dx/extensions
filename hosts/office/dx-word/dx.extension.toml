schema = "dx.extension.manifest"
manifest_version = 1

[extension]
id = "dx.word.command-center"
name = "DX Word Command Center"
publisher = "DX"
version = "0.1.0"
description = "Official Word task pane for DX status, assets, and receipt paths."
license = "MIT"
official = true

[compatibility]
dx_min = "0.1.0"
hosts = ["word"]
platforms = ["windows", "macos", "web"]
architectures = ["x86_64", "aarch64", "wasm32"]

[entrypoint]
transport = "http"
command = "dx-local-service"
args = []
cwd = "${host.document}"
startup_timeout_ms = 90000
shutdown_timeout_ms = 2000

[transport]
protocol = "dx-host-action"
framing = "json"
encoding = "utf8"
max_message_bytes = 1048576
heartbeat_interval_ms = 0
supports_cancel = false

[security]
trust = "host-user-approved"
signature = "development-unsigned"
sandbox = "office-web-addin"
network = "restricted-to-valid-domains"
secrets = "none"
redaction = "metadata-only"
stores_payloads = false
stores_process_output = false

[[capabilities]]
id = "office.taskpane"
required = true
scope = ["word-taskpane"]
reason = "Render a document-safe Word task pane with explicit user actions."

[[capabilities]]
id = "office.document.read"
required = true
scope = ["document-metadata"]
reason = "Read document context metadata for command availability only."

[[capabilities]]
id = "local_service.connect"
required = true
scope = ["dx-local-service"]
reason = "Connect to DX for asset and status requests when the service bridge is configured."

[[capabilities]]
id = "receipts.read"
required = true
scope = [".dx/receipts"]
reason = "Expose existing DX receipt location from the Word task pane."

[[host_actions]]
id = "dx.word.show_status"
group = "status"
label = "Show DX Status"
description = "Request DX status through the configured Word service bridge."
operation = "dx.status"
transport = "local-service"
input = "none"
output = "office-taskpane"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["office.taskpane", "local_service.connect"]

[[host_actions]]
id = "dx.word.search_assets"
group = "assets"
label = "Search DX Assets"
description = "Request DX font, media, and snippet search through the configured service bridge."
operation = "dx.assets.search"
transport = "local-service"
input = "text"
output = "office-taskpane"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["office.taskpane", "office.document.read", "local_service.connect"]

[[host_actions]]
id = "dx.word.copy_receipts_path"
group = "receipts"
label = "Copy DX Receipts Path"
description = "Show the local DX receipt folder path from Word."
operation = "receipt.copyPath"
transport = "host-ui"
input = "none"
output = "office-taskpane"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["office.taskpane", "receipts.read"]

[[receipts]]
id = "host-action-index"
schema = "dx.extension.host_action_index"
latest_path = ".dx/receipts/extensions/dx.word.command-center/host-action-index-latest.json"
retention_limit = 20
metadata_only = true
