<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DX Command Center</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <main>
      <button type="button" data-command="dx.powerpoint.show_status">Status</button>
      <input id="media-query" type="search" placeholder="Search DX media" />
      <button type="button" data-command="dx.powerpoint.search_media">Media</button>
      <button type="button" data-command="dx.powerpoint.copy_receipts_path">Receipts</button>
      <p id="dx-status" role="status"></p>
    </main>
    <script type="module" src="../src/taskpane.ts"></script>
  </body>
</html>
