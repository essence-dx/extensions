schema = "dx.extension.manifest"
manifest_version = 1

[extension]
id = "dx.visual-studio.command-center"
name = "DX Visual Studio Command Center"
publisher = "DX"
version = "0.1.0"
description = "Official Visual Studio SDK command center for DX status, asset search, and receipt paths."
license = "MIT"
official = true

[compatibility]
dx_min = "0.1.0"
hosts = ["visual-studio"]
platforms = ["windows"]
architectures = ["x86_64", "aarch64"]

[entrypoint]
transport = "http"
command = "dx-local-service"
args = []
cwd = "${host.solution}"
startup_timeout_ms = 90000
shutdown_timeout_ms = 2000

[transport]
protocol = "dx-host-action"
framing = "json"
encoding = "utf8"
max_message_bytes = 1048576
heartbeat_interval_ms = 0
supports_cancel = false

[security]
trust = "host-user-approved"
signature = "development-unsigned"
sandbox = "visual-studio-sdk-extension"
network = "deny-by-default"
secrets = "none"
redaction = "metadata-only"
stores_payloads = false
stores_process_output = false

[[capabilities]]
id = "visualstudio.command"
required = true
scope = ["command-palette", "menu"]
reason = "Expose explicit Visual Studio commands for user-invoked DX command plans."

[[capabilities]]
id = "visualstudio.solution.read"
required = true
scope = ["solution-metadata"]
reason = "Read coarse solution context when the Visual Studio host context is available."

[[capabilities]]
id = "local_service.connect"
required = true
scope = ["dx-local-service"]
reason = "Connect to DX for status and asset requests when the service bridge is configured."

[[capabilities]]
id = "receipts.read"
required = true
scope = [".dx/receipts"]
reason = "Expose existing DX receipt location from the Visual Studio host surface."

[[host_actions]]
id = "dx.visual-studio.show_status"
group = "status"
label = "Show DX Status"
description = "Request DX status through the future Visual Studio local-service bridge."
operation = "dx.status"
transport = "local-service"
input = "none"
output = "ide-notification"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["visualstudio.command", "local_service.connect"]

[[host_actions]]
id = "dx.visual-studio.search_assets"
group = "assets"
label = "Search DX Assets"
description = "Request DX icon, font, and media asset search through the future local-service bridge."
operation = "dx.assets.search"
transport = "local-service"
input = "text"
output = "tool-window"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["visualstudio.command", "visualstudio.solution.read", "local_service.connect"]

[[host_actions]]
id = "dx.visual-studio.show_receipts"
group = "receipts"
label = "Show DX Receipts Path"
description = "Show the local DX receipt folder path from Visual Studio."
operation = "receipt.showPath"
transport = "host-ui"
input = "none"
output = "ide-notification"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["visualstudio.command", "receipts.read"]

[[receipts]]
id = "host-action-index"
schema = "dx.extension.host_action_index"
latest_path = ".dx/receipts/extensions/dx.visual-studio.command-center/host-action-index-latest.json"
retention_limit = 20
metadata_only = true
