schema = "dx.extension.manifest"
manifest_version = 1

[extension]
id = "dx.premiere-pro.command-center"
name = "DX Premiere Pro Command Center"
publisher = "DX"
version = "0.1.0"
description = "Official Premiere Pro UXP command center for DX status, media asset search, and receipt paths."
license = "MIT"
official = true

[compatibility]
dx_min = "0.1.0"
hosts = ["premiere-pro"]
platforms = ["windows", "macos"]
architectures = ["x86_64", "aarch64"]

[entrypoint]
transport = "http"
command = "dx-local-service"
args = []
cwd = "${host.project}"
startup_timeout_ms = 90000
shutdown_timeout_ms = 2000

[transport]
protocol = "dx-host-action"
framing = "json"
encoding = "utf8"
max_message_bytes = 1048576
heartbeat_interval_ms = 0
supports_cancel = false

[security]
trust = "host-user-approved"
signature = "development-unsigned"
sandbox = "adobe-uxp-plugin"
network = "deny-by-default"
secrets = "none"
redaction = "metadata-only"
stores_payloads = false
stores_process_output = false

[[capabilities]]
id = "adobe.uxp.panel"
required = true
scope = ["plugin-panel", "plugin-commands"]
reason = "Render a Premiere Pro UXP panel and user-invoked command entries."

[[capabilities]]
id = "adobe.premiere.project.read"
required = true
scope = ["project-metadata"]
reason = "Reserve read-only project metadata for configured Premiere Pro host context without timeline or media mutation."

[[capabilities]]
id = "local_service.connect"
required = true
scope = ["dx-local-service"]
reason = "Connect to DX for media asset and status requests when the service bridge is configured."

[[capabilities]]
id = "receipts.read"
required = true
scope = [".dx/receipts"]
reason = "Expose existing DX receipt location from the Premiere Pro host surface."

[[host_actions]]
id = "dx.premiere-pro.show_status"
group = "status"
label = "Show DX Status"
description = "Request DX status through the configured Premiere Pro service bridge."
operation = "dx.status"
transport = "local-service"
input = "none"
output = "uxp-panel"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["adobe.uxp.panel", "local_service.connect"]

[[host_actions]]
id = "dx.premiere-pro.search_media_assets"
group = "media"
label = "Search DX Media Assets"
description = "Request DX media, icon, and font asset search through the configured service bridge."
operation = "dx.media.search"
transport = "local-service"
input = "text"
output = "uxp-panel"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["adobe.uxp.panel", "local_service.connect"]

[[host_actions]]
id = "dx.premiere-pro.show_receipts"
group = "receipts"
label = "Show DX Receipts Path"
description = "Show the local DX receipt folder path from Premiere Pro."
operation = "receipt.showPath"
transport = "host-ui"
input = "none"
output = "uxp-panel"
risk_level = "low"
requires_user_approval = false
writes_receipts = false
required_capabilities = ["adobe.uxp.panel", "receipts.read"]

[[receipts]]
id = "host-action-index"
schema = "dx.extension.host_action_index"
latest_path = ".dx/receipts/extensions/dx.premiere-pro.command-center/host-action-index-latest.json"
retention_limit = 20
metadata_only = true
